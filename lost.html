<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Lost Item</title>
<link rel="icon" type="image/jpg" href="assets/logo.jpg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="page-container">

  <div class="top-bar">

    <a href="index.html" class="btn">← Back Home</a>


  </div>


  <div class="glass-card form-card">

    <h1>Report Lost Item</h1>
    

    <form id="lostForm">

      <input type="text" id="lostName" placeholder="Item Name" required>

      <textarea id="lostDescription" placeholder="Description" required></textarea>

      <input type="text" id="lostLocation" placeholder="Last Seen Location" required>

      <input type="text" id="lostContact" placeholder="Contact Number" required>
      <input type="file" id="lostImage" accept="image/*">
      <button type="submit" class="btn">Submit</button>

    </form>

  </div>

</div>

<script type="module" src="firebase.js"></script>
<script src="darkmode.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
